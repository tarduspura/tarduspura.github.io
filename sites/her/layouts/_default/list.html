<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      background: #fff5f8;
      color: #5a4a5a;
    }

    /* Back to Homepage */
    .back-home {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #b8a8b8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
      z-index: 100;
    }

    .back-home:hover {
      color: #e8a4b8;
    }

    .back-home svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s;
    }

    .back-home:hover svg {
      transform: translateX(-3px);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .site-title {
      font-family: 'Caveat', cursive;
      font-size: 2.8rem;
      font-weight: 600;
      color: #e8a4b8;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 3rem;
    }

    nav a {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      color: #8a7a8a;
      text-decoration: none;
      padding: 0.3rem 0;
      transition: color 0.3s;
      position: relative;
    }

    nav a:hover, nav a.active {
      color: #e8a4b8;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: #e8a4b8;
      transition: width 0.3s;
    }

    nav a:hover::after, nav a.active::after {
      width: 100%;
    }

    main {
      max-width: 800px;
      margin: 2rem auto 4rem;
      padding: 0 2rem;
    }

    .page-title {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      color: #e8a4b8;
      text-align: center;
      margin-bottom: 2rem;
    }

    .article-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .article-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s;
      border: 1px solid #f5d5e0;
    }

    .article-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(232, 164, 184, 0.15);
      border-color: #e8a4b8;
    }

    .article-card h2 {
      font-size: 1.1rem;
      color: #5a4a5a;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .article-card .meta {
      font-size: 0.85rem;
      color: #b8a8b8;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: #b8a8b8;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #b8a8b8;
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 1.5rem;
        padding: 1.5rem 2rem;
      }
      nav { gap: 2rem; }
      .site-title { font-size: 2.2rem; }
      .back-home {
        top: 1rem;
        left: 1rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- Back to Homepage -->
  <a href="/" class="back-home">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    <span>Home</span>
  </a>

  <header>
    <a href="{{ .Site.BaseURL }}" class="site-title">Her ♡</a>
    <nav>
      <a href="{{ "location/" | relURL }}" {{ if eq .Section "location" }}class="active"{{ end }}>Location</a>
      <a href="{{ "restaurant/" | relURL }}" {{ if eq .Section "restaurant" }}class="active"{{ end }}>Restaurant</a>
      <a href="{{ "things/" | relURL }}" {{ if eq .Section "things" }}class="active"{{ end }}>Things</a>
    </nav>
  </header>

  <main>
    <h1 class="page-title">{{ .Title }}</h1>
    
    <div class="article-list">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="article-card">
        <h2>{{ .Title }}</h2>
        <div class="meta">{{ .Date.Format "2006年01月02日" }}</div>
      </a>
      {{ else }}
      <div class="empty">
        <p>暂无记录 ♡</p>
      </div>
      {{ end }}
    </div>
  </main>

  <footer>
    <p>Made with ♡ for her</p>
  </footer>
</body>
</html>
