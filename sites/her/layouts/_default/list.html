<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 50%, #e1bee7 100%);
      background-attachment: fixed;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #d4618c;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: #d4618c;
      margin-bottom: 0.5rem;
    }

    .page-header .count {
      color: #999;
      font-size: 0.9rem;
    }

    /* Article List */
    .article-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .article-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .article-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
    }

    .article-card h2 {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .article-card .meta {
      font-size: 0.85rem;
      color: #999;
    }

    .article-card .summary {
      margin-top: 0.75rem;
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #999;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <a href="/" class="back-link">← 返回首页</a>
      <h1>{{ .Title }}</h1>
      <p class="count">共 {{ len .Pages }} 篇记录</p>
    </header>

    <div class="article-list">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="article-card">
        <h2>{{ .Title }}</h2>
        <div class="meta">{{ .Date.Format "2006年01月02日" }}</div>
        {{ if .Summary }}
        <p class="summary">{{ .Summary | truncate 100 }}</p>
        {{ end }}
      </a>
      {{ else }}
      <div class="empty-state">
        <div class="icon">📝</div>
        <p>暂无记录</p>
      </div>
      {{ end }}
    </div>
  </div>
</body>
</html>
