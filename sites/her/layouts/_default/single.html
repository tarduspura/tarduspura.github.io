<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 50%, #e1bee7 100%);
      background-attachment: fixed;
      padding: 2rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* Back Link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #d4618c;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    /* Article */
    .article {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .article-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .article-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #d4618c;
      margin-bottom: 0.75rem;
    }

    .article-header .meta {
      color: #999;
      font-size: 0.9rem;
    }

    /* Content */
    .article-content {
      color: #555;
      line-height: 1.9;
      font-size: 1.05rem;
    }

    .article-content p {
      margin-bottom: 1.25rem;
    }

    .article-content h2 {
      font-size: 1.4rem;
      color: #d4618c;
      margin: 2rem 0 1rem;
    }

    .article-content h3 {
      font-size: 1.2rem;
      color: #666;
      margin: 1.5rem 0 0.75rem;
    }

    .article-content img {
      max-width: 100%;
      border-radius: 12px;
      margin: 1.5rem 0;
    }

    .article-content a {
      color: #d4618c;
      text-decoration: none;
      border-bottom: 1px solid #f8bbd9;
      transition: border-color 0.2s;
    }

    .article-content a:hover {
      border-color: #d4618c;
    }

    .article-content blockquote {
      border-left: 3px solid #f8bbd9;
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: #888;
      font-style: italic;
    }

    .article-content ul, .article-content ol {
      margin: 1rem 0 1rem 1.5rem;
    }

    .article-content li {
      margin-bottom: 0.5rem;
    }

    /* Navigation */
    .article-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .article-nav a {
      color: #d4618c;
      text-decoration: none;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .article-nav a:hover {
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .article {
        padding: 1.5rem;
      }

      .article-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="{{ .Parent.Permalink }}" class="back-link">← 返回{{ .Parent.Title }}</a>

    <article class="article">
      <header class="article-header">
        <h1>{{ .Title }}</h1>
        <div class="meta">{{ .Date.Format "2006年01月02日" }}</div>
      </header>

      <div class="article-content">
        {{ .Content }}
      </div>

      <nav class="article-nav">
        {{ with .PrevInSection }}
        <a href="{{ .Permalink }}">← {{ .Title }}</a>
        {{ else }}
        <span></span>
        {{ end }}
        {{ with .NextInSection }}
        <a href="{{ .Permalink }}">{{ .Title }} →</a>
        {{ end }}
      </nav>
    </article>
  </div>
</body>
</html>
