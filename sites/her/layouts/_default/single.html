<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      background: #fff5f8;
      color: #5a4a5a;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .site-title {
      font-family: 'Caveat', cursive;
      font-size: 2.8rem;
      font-weight: 600;
      color: #e8a4b8;
      text-decoration: none;
    }

    .site-title::after {
      content: ' ♡';
      font-size: 1.5rem;
    }

    nav {
      display: flex;
      gap: 3rem;
    }

    nav a {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      color: #8a7a8a;
      text-decoration: none;
      padding: 0.3rem 0;
      transition: color 0.3s;
      position: relative;
    }

    nav a:hover, nav a.active {
      color: #e8a4b8;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: #e8a4b8;
      transition: width 0.3s;
    }

    nav a:hover::after, nav a.active::after {
      width: 100%;
    }

    main {
      max-width: 700px;
      margin: 2rem auto 4rem;
      padding: 0 2rem;
    }

    article {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 3rem;
      border: 1px solid #f5d5e0;
    }

    .article-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px dashed #f5d5e0;
    }

    .article-header h1 {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      color: #e8a4b8;
      margin-bottom: 0.5rem;
    }

    .article-header .meta {
      color: #b8a8b8;
      font-size: 0.9rem;
    }

    .article-content {
      color: #5a4a5a;
      line-height: 1.9;
      font-size: 1rem;
    }

    .article-content p {
      margin-bottom: 1.2rem;
    }

    .article-content img {
      max-width: 100%;
      border-radius: 12px;
      margin: 1.5rem 0;
    }

    .article-content a {
      color: #e8a4b8;
      text-decoration: none;
      border-bottom: 1px solid #f5d5e0;
    }

    .article-content a:hover {
      border-color: #e8a4b8;
    }

    .article-content blockquote {
      border-left: 3px solid #e8a4b8;
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: #8a7a8a;
      font-style: italic;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: #b8a8b8;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #e8a4b8;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #b8a8b8;
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 1.5rem;
        padding: 1.5rem 2rem;
      }
      nav { gap: 2rem; }
      .site-title { font-size: 2.2rem; }
      article { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ "/" | relURL }}" class="site-title">Her</a>
    <nav>
      <a href="{{ "location/" | relURL }}" {{ if eq .Section "location" }}class="active"{{ end }}>Location</a>
      <a href="{{ "restaurant/" | relURL }}" {{ if eq .Section "restaurant" }}class="active"{{ end }}>Restaurant</a>
      <a href="{{ "things/" | relURL }}" {{ if eq .Section "things" }}class="active"{{ end }}>Things</a>
    </nav>
  </header>

  <main>
    <a href="{{ .Parent.Permalink }}" class="back-link">← 返回{{ .Parent.Title }}</a>
    
    <article>
      <header class="article-header">
        <h1>{{ .Title }}</h1>
        <div class="meta">{{ .Date.Format "2006年01月02日" }}</div>
      </header>

      <div class="article-content">
        {{ .Content }}
      </div>
    </article>
  </main>

  <footer>
    <p>Made with ♡ for her</p>
  </footer>
</body>
</html>
