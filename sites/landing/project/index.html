<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Tardus Pura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }
    .back-link svg { width: 18px; height: 18px; }
    .page-title {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      margin-bottom: 3rem;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .project-card:hover {
      border-color: #444;
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .project-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .project-card h3 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }
    .project-card p {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .project-tag {
      background: #2a2a2a;
      color: #888;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Home
    </a>
    <h1 class="page-title">Projects</h1>
    <p class="page-subtitle">我的项目展示</p>
    
    <div class="projects-grid">
      <a href="/project/calender/" class="project-card">
        <div class="project-icon">📅</div>
        <h3>医院排班系统</h3>
        <p>面向本地使用场景的医院门诊排班编辑工具，支持拖拽调整、一键导出高分辨率排班图片。</p>
        <div class="project-tags">
          <span class="project-tag">Electron</span>
          <span class="project-tag">Vue 3</span>
          <span class="project-tag">TypeScript</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
