<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friends - Tardus Pura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }
    .back-link svg { width: 18px; height: 18px; }
    .page-title {
      color: #fff;
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .page-subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }
    .friends-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .friend-card {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .friend-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .friend-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      flex-shrink: 0;
    }
    .friend-avatar-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .friend-info h3 {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 0.25rem;
    }
    .friend-info p {
      font-size: 0.85rem;
      color: #888;
    }
    .apply-section {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2rem;
      color: #fff;
    }
    .apply-section h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }
    .apply-section p {
      color: rgba(255,255,255,0.8);
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    .apply-section a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Home
    </a>
    <h1 class="page-title">My Friends</h1>
    <p class="page-subtitle">友链列表</p>
    
    <div class="friends-grid">
      <a href="https://ccc-yuan.github.io/Personal-Homepage" target="_blank" class="friend-card">
        <img src="/link/avatars/gcy_link.jpg" alt="放荡不羁的南人" class="friend-avatar-img">
        <div class="friend-info">
          <h3>放荡不羁的南人</h3>
          <p>Personal Homepage</p>
        </div>
      </a>
    </div>

    <div class="apply-section">
      <h2>友链申请</h2>
      <p>如果你想和我交换友链，欢迎通过以下方式联系我：</p>
      <p>
        <strong>GitHub:</strong> <a href="https://github.com/tarduspura" target="_blank">tarduspura</a><br>
        <strong>Email:</strong> <a href="mailto:tarduspura@gmail.com">tarduspura@gmail.com</a>
      </p>
    </div>
  </div>
</body>
</html>
